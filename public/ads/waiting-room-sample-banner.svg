  <rect width="900" height="200" fill="url(#bg)"/>
  <circle cx="810" cy="40" r="110" fill="#60A5FA" fill-opacity="0.18"/>
  <circle cx="860" cy="170" r="90" fill="#93C5FD" fill-opacity="0.18"/>
  <rect x="390" y="52" width="120" height="30" rx="15" fill="url(#chip)"/>
  <text x="450" y="73" text-anchor="middle" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="14" font-weight="700" fill="#1D4ED8">단짠 광고</text>
  <text x="450" y="116" text-anchor="middle" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="30" font-weight="800" fill="#FFFFFF">광고 슬롯</text>
  <text x="450" y="152" text-anchor="middle" font-family="Pretendard, Noto Sans KR, sans-serif" font-size="14" font-weight="500" fill="#DBEAFE">관리자 페이지에서 광고를 등록하면 여기에 표시됩니다</text>
