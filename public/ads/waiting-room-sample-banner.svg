      <stop stop-color="#1E40AF"/>
      <stop offset="1" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="120" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#DBEAFE"/>
